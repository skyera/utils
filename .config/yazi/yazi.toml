[manager]
ratio = [1, 4, 3]
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = false
show_symlink = true

[tasks]
suppress_preload = true


[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
    { run = 'vim "$@"', block = true, for = "unix" },
    { run = 'cmd /c "where nvim >nul 2>nul && nvim %* || vim %*"', block = true, for = "windows" }
]

[open]
rules = [
    { url = "*", use = "edit" }
]
