set load_default_rc true
set line_numbers true
set preview_images true
set draw_borders both
set preview_images_method w3m
default_linemode devicons
set colorscheme solarized
set sort mtime
set preview_files true
set preview_script ~/.config/ranger/scope.sh
set unicode_ellipsis true
set show_hidden true
set vcs_aware true

# --- FZF Integration ---
map ff fzf_select
map fl fzf_locate

# --- Navigation & Quick Access ---
map cf shell nvim ~/.config/ranger/rc.conf
map cw shell nvim ~/.config/ranger/commands.py

# --- Integration Bindings ---
map ;n eval fm.execute_console('shell nvim')
map ;dd eval fm.execute_console('delete %s')
map ;u eval fm.execute_console('shell gdu')

# --- Clipboard (OSC52 Support) ---
map yp shell echo -n %d/%f | ~/test/utils/bin/osc52-yank.sh
map yd shell echo -n %d    | ~/test/utils/bin/osc52-yank.sh
map yn shell echo -n %f    | ~/test/utils/bin/osc52-yank.sh
