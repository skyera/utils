set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB:it"
set -g mouse on
set -g allow-passthrough on
set -g renumber-windows on
set -s set-clipboard on
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 50000

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jimeh/tmux-themepack'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @themepack 'powerline/default/orange'
set -g @resurrect-strategy-nvim 'session'

# set vi-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

bind-key S run-shell -b '~/.tmux/plugins/tmux-fzf/scripts/session.sh switch'
bind-key C display-popup -b rounded -w 80% -h 60% -E -d "#{pane_current_path}" "$SHELL"
bind f send-keys "ranger" C-m
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Toggle mouse on/off
bind m set-option -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# Use Alt-hjkl keys without prefix to switch panes
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Edit pane history in a temporary file
bind-key e run-shell ' \
    file="/tmp/tmux_capture_$(date +%Y%m%d_%H%M%S)_$$.txt"; \
    tmux capture-pane -J -pS - > "$file"; \
    tmux split-window -v -p 30 "bash -c \"${EDITOR:-nvim} $file; rm -f $file\""'

run '~/.tmux/plugins/tpm/tpm'

# Unbind the default mappings that vim-tmux-navigator sets up automatically
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l

